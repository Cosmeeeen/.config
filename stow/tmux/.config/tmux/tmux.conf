# Start windows and panes at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Mouse support (click to switch panes/windows, scroll)
set -g mouse on

# Increase scrollback history
set -g history-limit 10000

# Focus events (the Claude Code warning)
set -g focus-events on

# No delay when pressing Escape (important for nvim)
set -sg escape-time 0

# Easier splits — use | and - instead of % and ":
bind | split-window -h
bind - split-window -v

# Vim-style pane navigation:
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move status bar to top
set -g status-position top

# Gruvbox status bar (bg=default keeps it transparent over the translucent terminal)
set -g status-style 'bg=default fg=#a89984'
set -g window-status-current-style 'fg=#fabd2f bold'
set -g status-left '#[fg=#83a598,bold] #S  '
set -g status-right '#[fg=#928374] %H:%M '
set -g window-status-separator ' · '

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g allow-passthrough on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Persist & auto-restore sessions across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

